name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas pytest

      - name: Build C++ extension
        # Mirrors local `make build`: cmake builds the .so into screamer/.
        # devtools/sii.py finds it there; tests run directly from the project
        # root without needing pip install (and without scikit-build-core's
        # editable-install quirks).
        run: make build

      - name: Run pytest
        run: pytest -q
