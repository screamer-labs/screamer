name: Tests

# Dev CI: a fast signal on every push to main and every PR. It deliberately
# does NOT trigger on tags -- the release pipeline (build-wheels.yml) runs the
# full multi-Python suite itself, as the gate before building/publishing, so a
# tag would otherwise fire this workflow a second time on the same commit.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt every action into Node.js 24 immediately rather than waiting for each
# action to publish a Node 24 major. Suppresses the deprecation warnings on
# actions/setup-python, actions/upload-artifact, etc. that still ship Node 20.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pytest:
    name: pytest (ubuntu, py3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy scipy pandas pytest pyyaml

      - name: Build C++ extension
        # Mirrors local `make build`: cmake builds the .so into screamer/.
        # devtools/sii.py finds it there; tests run directly from the project
        # root without needing pip install (and without scikit-build-core's
        # editable-install quirks).
        run: make build

      - name: Run pytest
        run: pytest -q

  clang-tidy:
    name: clang-tidy (member-init check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install clang-tidy + Python build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy
          python -m pip install --upgrade pip
          pip install pybind11 numpy

      - name: Configure (generate compile_commands.json)
        # Don't actually compile — we only need the compile-commands db.
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        # cppcoreguidelines-pro-type-member-init catches uninitialised class
        # members — the bug class that hit RollingZscore on Ubuntu+CPython 3.14.
        # --warnings-as-errors makes any new violation fail CI.
        run: |
          clang-tidy -p build --quiet --warnings-as-errors='*' \
            --checks='-*,cppcoreguidelines-pro-type-member-init' \
            bindings/*.cpp src/screamer/common/*.cpp src/screamer/detail/*.cpp
