name: Build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish built artifacts to TestPyPI (a dry run of the release pipeline via OIDC)"
        type: boolean
        default: false

# Cancel in-progress runs of the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Opt every action into Node.js 24 immediately (silences the Node 20
# deprecation warnings on actions that haven't published a Node 24 major yet).
# MACOSX_DEPLOYMENT_TARGET=10.13: matches the floor enforced in CMakeLists.txt
# so the wheel filename reflects what the .so actually requires. Setting it at
# the workflow env level is the most reliable way -- cibuildwheel's per-platform
# `environment` field in pyproject.toml didn't propagate to the wheel-tagging
# step. cibuildwheel auto-bumps to 11.0 for arm64 builds.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  MACOSX_DEPLOYMENT_TARGET: "10.13"

jobs:
  build_wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-14 (Apple Silicon) cross-compiles BOTH x86_64 and arm64 wheels
        # via cibuildwheel's archs=["x86_64","arm64"] in pyproject.toml.
        # macos-13 (Intel runners) is intentionally omitted -- GitHub Actions
        # has throttled Intel mac runners, and macos-14 covers x86_64 anyway.
        os: [ubuntu-latest, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels
        # NOTE: verify this cibuildwheel version builds CPython 3.14 wheels
        # before tagging a release; bump the pin if cp314 is missing.
        uses: pypa/cibuildwheel@v2.22
        env:
          # Wheels must run on any CPU, so leave SCREAMER_NATIVE_ARCH off.
          CIBW_ENVIRONMENT: "SCREAMER_NATIVE_ARCH=OFF"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v6
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  github_release:
    name: Attach to GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish_pypi:
    name: Publish to PyPI (OIDC)
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Real releases only: a pushed version tag.
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/project/screamer/
    permissions:
      id-token: write   # Trusted Publishing: PyPI verifies this workflow via OIDC
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        # No username/password/token: with id-token write and a trusted
        # publisher configured on pypi.org (repo simu-ai/screamer, workflow
        # build-wheels.yml, environment pypi), the action mints a short-lived
        # OIDC token automatically.
        uses: pypa/gh-action-pypi-publish@release/v1

  publish_testpypi:
    name: Publish to TestPyPI (OIDC dry run)
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Manual dry run only: workflow_dispatch with testpypi=true. Requires a
    # separate trusted publisher configured on test.pypi.org.
    if: github.event_name == 'workflow_dispatch' && inputs.testpypi
    environment:
      name: testpypi
      url: https://test.pypi.org/project/screamer/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
