name: Build wheels

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to private PyPI after build (requires PRIVATE_PYPI_URL var + secrets)"
        type: boolean
        default: false

# Cancel in-progress runs of the same workflow on the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# Opt every action into Node.js 24 immediately (silences the Node 20
# deprecation warnings on actions that haven't published a Node 24 major yet).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build_wheels:
    name: Wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # macos-13 = x86_64 runner, macos-14 = arm64 runner
        os: [ubuntu-latest, macos-13, macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          # Wheels must run on any CPU, so leave SCREAMER_NATIVE_ARCH off.
          CIBW_ENVIRONMENT: "SCREAMER_NATIVE_ARCH=OFF"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build sdist
        run: |
          python -m pip install --upgrade build
          python -m build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  github_release:
    name: Attach to GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish_private_pypi:
    name: Publish to private PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Activates when:
    #   - a tag push and the PRIVATE_PYPI_URL repo variable is set, OR
    #   - workflow_dispatch with inputs.publish=true
    # Until then this job is skipped automatically.
    if: |
      (startsWith(github.ref, 'refs/tags/v') && vars.PRIVATE_PYPI_URL != '')
      || (github.event_name == 'workflow_dispatch' && inputs.publish)
    environment: private-pypi
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install twine
        run: pip install --upgrade twine

      - name: Upload to pypi.deep.fund
        env:
          TWINE_REPOSITORY_URL: ${{ vars.PRIVATE_PYPI_URL }}
          TWINE_USERNAME: ${{ secrets.PRIVATE_PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PRIVATE_PYPI_PASSWORD }}
        run: twine upload --skip-existing --non-interactive dist/*
