name: Docs

# Manual for now (matches the cost-reduced posture of tests.yml). Enable the
# push / pull_request triggers below to build docs as a PR/main check.
on:
  workflow_dispatch:
  # push:         { branches: [main] }
  # pull_request: { branches: [main] }

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Opt into Node 24 (as in tests.yml) to suppress action deprecation warnings.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  docs:
    name: build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Graphviz (dot binary for the DAG diagrams)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Install screamer + docs deps
        # pip build-isolation compiles the pybind11 extension via scikit-build-core;
        # '.[docs]' pulls sphinx, myst-nb, plotly, matplotlib, graphviz, etc.
        run: |
          python -m pip install --upgrade pip
          pip install '.[docs]'

      - name: Build docs (executes the notebooks)
        run: sphinx-build -b html docs docs/_build/html

      - name: Upload built HTML
        uses: actions/upload-artifact@v4
        with:
          name: docs-html
          path: docs/_build/html
