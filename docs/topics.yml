# Canonical topic registry for the screamer function index.
#
# Single source of truth: each function page declares topic *slugs* in its
# frontmatter (e.g. `topics: [volatility, statistics]`); this file maps each slug
# to its display name and one-line definition. The generated topic index and the
# per-page "Topics:" links both read from here, so renaming a topic is a one-line
# edit. CI validates every frontmatter slug against these keys and fails the build
# on an unknown slug or a function with zero topics.
#
# Slug rules: lowercase ASCII, hyphen-separated, full words (no abbreviations).
# Order below is the display order for the index.

# Broad groups for the left-nav. Each group lists its member topic slugs (from
# `topics:` below) in display order. Every topic must belong to exactly one group.
# Group order here is the display order in the sidebar. Names avoid "rolling",
# "window", and "moving" (every operator is windowed, so those do not distinguish).
groups:
  statistics:
    name: "Statistics"
    desc: "Measures of a window: central tendency, dispersion, quantiles, moments, z-scores, running totals, and cross-series relationships."
    topics: [statistics, volatility, standardization, cumulative, regression]

  smoothing-filters:
    name: "Smoothing & filters"
    desc: "Track and denoise the level of a series: moving averages and designed filters."
    topics: [smoothing, filtering]

  indicators:
    name: "Technical indicators"
    desc: "Market indicators: trend, momentum, bands, volume, and returns."
    topics: [trend, momentum, bands, volume, returns]

  microstructure:
    name: "Market microstructure"
    desc: "Order flow and liquidity from trades and quotes: trade signing, imbalance, price impact, and arrival intensity."
    topics: [trade-signing, order-flow-imbalance, price-impact, order-flow-arrivals]

  backtesting-risk:
    name: "Backtesting & risk"
    desc: "Turn signals into costed equity curves, and measure drawdown and performance."
    topics: [risk, backtesting]

  math-logic:
    name: "Math & logic"
    desc: "Elementwise numeric, trigonometric, activation, and boolean operations."
    topics: [arithmetic, trig, activations, logic]

  data-prep:
    name: "Data preparation"
    desc: "Clean a series before analysis: fill or drop missing values, and despike outliers."
    topics: [missing-data, outliers]

  streaming:
    name: "Streaming & pipelines"
    desc: "Align and reshape event streams, and wire operators into a runnable pipeline."
    topics: [streams, graphs]

  machine-learning:
    name: "Machine learning"
    desc: "Utilities for building supervised learning datasets from time-series data."
    topics: [supervised]

topics:
  arithmetic:
    name: "Arithmetic"
    desc: "Elementwise numeric operations: rounding, powers, logs, exponentials, affine transforms, sign, and special functions."

  trig:
    name: "Trigonometry & geometry"
    desc: "Angles, inverse trigonometric functions, coordinate conversions, and distances."

  activations:
    name: "Activations"
    desc: "Neural-network activation functions."

  smoothing:
    name: "Smoothing & moving averages"
    desc: "Track the level of a series and suppress short-term noise."

  filtering:
    name: "Filtering"
    desc: "Designed frequency-domain and state-space filters."

  statistics:
    name: "Statistics"
    desc: "Windowed summary statistics: central tendency, dispersion, quantiles, moments, and extremes."

  volatility:
    name: "Volatility"
    desc: "The size of fluctuations and risk: standard deviation and variance, RMS, range-based OHLC estimators, and ATR."

  standardization:
    name: "Standardization & normalization"
    desc: "Put values on a comparable scale: z-scores, affine rescaling, and detrending."

  returns:
    name: "Returns & changes"
    desc: "Differences, returns, rates of change, and lags."

  cumulative:
    name: "Cumulative"
    desc: "Running aggregates from the start of the series."

  trend:
    name: "Trend"
    desc: "Direction and trend-following: trend-tracking averages, slope fits, ADX, and channels."

  momentum:
    name: "Momentum & oscillators"
    desc: "Rate-of-change and overbought/oversold indicators."

  bands:
    name: "Bands & channels"
    desc: "Envelopes around price."

  volume:
    name: "Volume"
    desc: "Volume-based indicators."

  regression:
    name: "Correlation & regression"
    desc: "Relationships between series: correlation, covariance, regression, hedging, pairs, and mean-reversion."

  risk:
    name: "Risk & performance"
    desc: "Drawdowns and performance ratios."

  backtesting:
    name: "Backtesting"
    desc: "Simulate a strategy against market data into a costed equity curve: signals, bars, the trade tape, and top-of-book quotes."

  missing-data:
    name: "Missing data"
    desc: "Filling and removing NaN values."

  outliers:
    name: "Outliers & robustness"
    desc: "Despiking and robust estimators."

  streams:
    name: "Streams"
    desc: "Aligning, combining, and reshaping event streams."

  logic:
    name: "Logic & comparison"
    desc: "Boolean masks, comparisons, and conditional selection. Outputs are 1.0 (true) or 0.0 (false)."

  trade-signing:
    name: "Trade signing"
    desc: "Classify each trade as buyer- or seller-initiated to recover signed order flow."

  order-flow-imbalance:
    name: "Order-flow imbalance"
    desc: "Net buying pressure and its toxicity: trade-flow imbalance, book imbalance, and VPIN."

  price-impact:
    name: "Price impact & liquidity"
    desc: "How far order flow moves price and what trading costs: Kyle's lambda, Amihud, Roll spread, the propagator, and the micro-price."

  order-flow-arrivals:
    name: "Order-flow arrivals"
    desc: "The timing and clustering of trades: self-exciting arrival intensity."

  graphs:
    name: "Pipelines"
    desc: "Building and running a pipeline."

  supervised:
    name: "Supervised learning"
    desc: "Building forecasting training sets from causal time-series features and targets."
